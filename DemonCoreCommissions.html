<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commissions - Demon Core Animations</title>
    <link rel="stylesheet" href="DemonCoreAnimation.css">
   
</head>
<body class="commissions">
    <header>
        <a href="DemonCoreAnimations.html" class="header-brand">
            <img class="logo-img" src="logo.png" alt="Demon Core Animations Logo">
            <h1>Demon Core Animations</h1>  
        </a>
        <nav>
            <ul>
                <li><a href="DemonCoreAnimations.html">Home</a></li>
                <li><a href="DemonCoreGallery.html">Gallery</a></li>
                <li><a href="product.html">Shop</a></li>
                <li><a href="DemonCoreCommissions.html" class="active">Commissions</a></li>
                <li><a href="DemonCoreCheckout.html">Checkout</a></li>
                <li id="logout-item" style="display: none;"><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </nav>
    </header>  
    <main>
        <h2 class="page-title">Request a Project</h2>
        
        <div class="form-container card">
            <form action="mailto:tariquelevy761@gmail.com" method="post" enctype="text/plain">
                <div class="form-group">
                    <input type="text" class="form-control" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" class="form-control" name="email" placeholder="Your Email address" required>
                </div>
                <div class="form-group">
                    <select class="form-control" name="project_type">
                        <option value="" disabled selected>Select Project Type</option>
                        <option value="Posters">Posters</option>
                        <option value="Portraits">Portraits</option>
                        <option value="Logos">Logo</option>
                        <option value="Character Design">Character Design</option>
                        <option value="Paintings">Paintings</option>
                        <option value="Sculptures">Sculptures</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                        <textarea class="form-control" name="details" placeholder="Tell us about your project... Include timeline and budget constraints if any." required></textarea>
                    </div>
                <button type="submit" class="btn form-submit">Send Inquiry</button>
            </form>
        </div>
    </main>
    <footer>
        <p>Demon Core Animations</p>
        <a href="DemonCoreCommissions.html">Set up your first commisioned piece</a>
    </footer>
    <script src="DemonCoreAuth.js"></script>
    <script src="DemonCoreLogout.js"></script>
</body>
</html>
